name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # Needed to upload release assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_name: a1-gateway
            asset_suffix: aarch64-apple-darwin

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_name: a1-gateway
            asset_suffix: x86_64-apple-darwin

          # Linux x86_64 (glibc)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: a1-gateway
            asset_suffix: x86_64-unknown-linux-gnu

          # Linux ARM64 (glibc)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: a1-gateway
            asset_suffix: aarch64-unknown-linux-gnu
            cross: true

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_name: a1-gateway.exe
            asset_suffix: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for ARM64 Linux)
        if: matrix.cross
        run: cargo install cross --quiet

      - name: Build binary (native)
        if: "!matrix.cross"
        run: cargo build --release --package a1-gateway --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross
        run: cross build --release --package a1-gateway --target ${{ matrix.target }}

      - name: Get version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin_name }}"
          DST="a1-gateway-${{ steps.version.outputs.version }}-${{ matrix.asset_suffix }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then DST="${DST}.exe"; fi
          mv "$SRC" "$DST"
          echo "ASSET=$DST" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
