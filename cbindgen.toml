# cbindgen configuration for dyolo-kya C header generation.
#
# Run:   cbindgen --config cbindgen.toml --output include/dyolo_kya.h
# Docs:  https://github.com/mozilla/cbindgen/blob/master/docs.md

language = "C"

# Only export symbols from src/ffi.rs
include_guard = "DYOLO_KYA_H"
tab_width = 4
documentation = true
documentation_style = "doxy"

[export]
prefix = "Dyolo"
include = [
    "KyaStatus",
    "OpaqueIdentity",
    "OpaqueChain",
]

[fn]
prefix = "dyolo_"
rename_args = "snake_case"

[enum]
rename_variants = "ScreamingSnakeCase"

[layout]
packed = false
aligned_n = 0

[defines]
"feature = ffi" = "DYOLO_KYA_FFI"
"feature = wire" = "DYOLO_KYA_WIRE"
